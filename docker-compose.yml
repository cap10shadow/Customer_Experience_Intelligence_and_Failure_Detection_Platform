services:
  postgres:
    image: postgres:15-alpine
    container_name: oi_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-operational_intelligence}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-operational_intelligence}"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway_service:
    build:
      context: .
      dockerfile: backend/services/gateway_service/Dockerfile
    container_name: oi_gateway
    command: uvicorn backend.services.gateway_service.app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${GATEWAY_SERVICE_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  ingestion_service:
